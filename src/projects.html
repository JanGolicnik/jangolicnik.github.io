<!doctype html>
<html lang="en">
    <c-head></c-head>
    <body>
        <c-nav></c-nav>
        <main>
            <section role="content" class="bottom-pad">
                <article>
                    <script &&>
                        return projects
                            .map((p) => {
                                const tagsArray =
                                    typeof p.tags === "string"
                                        ? [p.tags]
                                        : Array.isArray(p.tags)
                                          ? p.tags
                                          : [];
                                let tags = tagsArray.length
                                    ? `${tagsArray
                                          .map(
                                              (t) => `
                                       <p class="muted">${t}</p>
                                       `,
                                          )
                                          .join("")}`
                                    : "";
                                return `
                                       <article id="${p.id}" class="card">
                                           <div class="tags">
                                               <p>
                                                   ${p.name}
                                                   <span class="meta"
                                                       >(<a href="${p.repo}">repo</a>)</span
                                                   >
                                               </p>
                                               ${tags}
                                           </div>
                                           <p class="indent">${p.description}</p>
                                       </article>
                                       `;
                            })
                            .join("\n");
                    </script>
                </article>
            </section>
            <c-plant></c-plant>
        </main>
    </body>
</html>
